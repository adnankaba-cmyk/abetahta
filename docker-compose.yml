# ============================================
# abeTahta - Docker Compose (Development)
# Kullanım: docker compose up -d
# ============================================

services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: abetahta-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: abetahta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-abetahta_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: abetahta-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-abetahta_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-abetahta_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
